<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeerFlow Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 40%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      main {
        width: min(640px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5e1;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: #38bdf8;
        color: #082f49;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      code {
        font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="stack">
        <h1>DeerFlow Desktop</h1>
        <p>
          This bundled local fallback page checks whether DeerFlow is reachable at
          <code>http://localhost:2026</code>. When the local app is ready, this window redirects to a new
          chat automatically.
        </p>
        <p id="preflight-status">
          Starting one local connectivity check now. If DeerFlow is still booting, you can retry manually.
        </p>
        <div class="actions">
          <button id="retry-button" type="button">Retry connection</button>
        </div>
      </div>
    </main>
    <script type="module" src="./preflight.js"></script>
  </body>
</html>
