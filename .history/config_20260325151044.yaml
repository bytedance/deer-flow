  # SiliconFlow 模型 - 支持多种大模型 (https://cloud.siliconflow.cn)
  # ============================================================================
  
  # Qwen2.5-72B-Instruct (通义千问) - 支持思考
  - name: siliconflow-qwen-72b
    display_name: Qwen2.5-72B (SiliconFlow)
    use: langchain_openai:ChatOpenAI
    model: Qwen/Qwen2.5-72B-Instruct
    api_key: $SILICONFLOW_API_KEY
    base_url: https://api.siliconflow.cn/v1
    max_tokens: 4096
    temperature: 0.7
    supports_vision: false
    supports_thinking: true

