# DeerFlow Development Environment (Simplified)
# Usage: ./scripts/docker.sh start

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    network_mode: "host"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    restart: unless-stopped

  # Frontend - Next.js Development Server
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      network: host
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: deer-flow-frontend
    network_mode: "host"
    command: sh -c "cd frontend && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../frontend/next.config.js:/app/frontend/next.config.js:ro
      - ../logs:/app/logs
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    env_file:
      - ../frontend/.env
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      network: host
      cache_from:
        - type=local,src=/tmp/docker-cache-gateway
    container_name: deer-flow-gateway
    network_mode: "host"
    # Using port 8003 to avoid conflict with mineru-api on 8001
    command: sh -c "cd backend && uv run uvicorn src.gateway.app:app --host 0.0.0.0 --port 8003 --reload --reload-include='*.yaml .env' > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/src:/app/backend/src
      - ../backend/.env:/app/backend/.env
      - ../config.yaml:/app/config.yaml
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ../backend/.deer-flow:/app/backend/.deer-flow
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
      - GATEWAY_PORT=8003
      - UVICORN_PORT=8003
      - HOST_SKILLS_PATH=${HOST_SKILLS_PATH}
    env_file:
      - ../.env
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      network: host
      cache_from:
        - type=local,src=/tmp/docker-cache-langgraph
    container_name: deer-flow-langgraph
    network_mode: "host"
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024 > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/src:/app/backend/src
      - ../backend/.env:/app/backend/.env
      - ../config.yaml:/app/config.yaml
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ../backend/.deer-flow:/app/backend/.deer-flow
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
      - HOST_SKILLS_PATH=${HOST_SKILLS_PATH}
    env_file:
      - ../.env
    restart: unless-stopped
