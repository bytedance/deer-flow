apiVersion: v1
kind: Service
metadata:
  name: {{ include "deerflow.fullname" . }}-langgraph
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: langgraph
spec:
  type: ClusterIP
  ports:
    - port: 2024
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "deerflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: langgraph
