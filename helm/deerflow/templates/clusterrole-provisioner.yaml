{{- if and .Values.provisioner.enabled .Values.provisioner.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deerflow.fullname" . }}-provisioner
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: provisioner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
{{- end }}
