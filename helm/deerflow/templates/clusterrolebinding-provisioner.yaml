{{- if and .Values.provisioner.enabled .Values.provisioner.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deerflow.fullname" . }}-provisioner
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "deerflow.fullname" . }}-provisioner
subjects:
  - kind: ServiceAccount
    name: {{ include "deerflow.fullname" . }}-provisioner
    namespace: {{ .Release.Namespace }}
{{- end }}
