apiVersion: v1
kind: Service
metadata:
  name: {{ include "deerflow.fullname" . }}-nginx
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.serviceType }}
  ports:
    - port: 2026
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "deerflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
