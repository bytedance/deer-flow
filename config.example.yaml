# ============================================================================
# Tool Groups Configuration
# ============================================================================
# Define groups of tools for organization and access control

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools Configuration
# ============================================================================
# Configure available tools for the agent to use

tools:
  # Web search tool (requires Tavily API key)
  - name: web_search
    group: web
    use: src.community.tavily.tools:web_search_tool
    max_results: 5
    # api_key: $TAVILY_API_KEY  # Set if needed

  # Web search tool (requires InfoQuest API key)
  # - name: web_search
  #   group: web
  #   use: src.community.infoquest.tools:web_search_tool
  #   # Used to limit the scope of search results, only returns content within the specified time range. Set to -1 to disable time filtering
  #   search_time_range: 10

  # Web fetch tool (uses Jina AI reader)
  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # Web fetch tool (uses InfoQuest AI reader)
  # - name: web_fetch
  #   group: web
  #   use: src.community.infoquest.tools:web_fetch_tool
  #   # Overall timeout for the entire crawling process (in seconds). Set to positive value to enable, -1 to disable
  #   timeout: 10
  #   # Waiting time after page loading (in seconds). Set to positive value to enable, -1 to disable
  #   fetch_time: 10
  #   # Timeout for navigating to the page (in seconds). Set to positive value to enable, -1 to disable
  #   navigation_timeout: 30

  # Image search tool (uses DuckDuckGo)
  # Use this to find reference images before image generation
  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

  # File operations tools
  - name: ls
    group: file:read
    use: src.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: src.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: src.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: src.sandbox.tools:str_replace_tool

  # Bash execution tool
  - name: bash
    group: bash
    use: src.sandbox.tools:bash_tool

# ============================================================================
# Sandbox Configuration
# ============================================================================
# Choose between local sandbox (direct execution) or Docker-based AIO sandbox

# Option 1: Local Sandbox (Default)
# Executes commands directly on the host machine
sandbox:
  use: src.sandbox.local:LocalSandboxProvider

# Option 2: Container-based AIO Sandbox
# Executes commands in isolated containers (Docker or Apple Container)
# On macOS: Automatically prefers Apple Container if available, falls back to Docker
# On other platforms: Uses Docker
# Uncomment to use:
# sandbox:
#   use: src.community.aio_sandbox:AioSandboxProvider
#
#   # Optional: Use existing sandbox at this URL (no container will be started)
#   # base_url: http://localhost:8080
#
#   # Optional: Container image to use (works with both Docker and Apple Container)
#   # Default: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#   # Recommended: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest (works on both x86_64 and arm64)
#   # image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#
#   # Optional: Base port for sandbox containers (default: 8080)
#   # port: 8080
#
#   # Optional: Whether to automatically start Docker container (default: true)
#   # auto_start: true
#
#   # Optional: Prefix for container names (default: deer-flow-sandbox)
#   # container_prefix: deer-flow-sandbox
#
#   # Optional: Additional mount directories from host to container
#   # NOTE: Skills directory is automatically mounted from skills.path to skills.container_path
#   # mounts:
#   #   # Other custom mounts
#   #   - host_path: /path/on/host
#   #     container_path: /home/user/shared
#   #     read_only: false
#
#   # Optional: Environment variables to inject into the sandbox container
#   # Values starting with $ will be resolved from host environment variables
#   # environment:
#   #   NODE_ENV: production
#   #   DEBUG: "false"
#   #   API_KEY: $MY_API_KEY        # Reads from host's MY_API_KEY env var
#   #   DATABASE_URL: $DATABASE_URL  # Reads from host's DATABASE_URL env var

# Option 3: Provisioner-managed AIO Sandbox (docker-compose-dev)
# Each sandbox_id gets a dedicated Pod in k3s, managed by the provisioner.
# Recommended for production or advanced users who want better isolation and scalability.:
# sandbox:
#   use: src.community.aio_sandbox:AioSandboxProvider
#   provisioner_url: http://provisioner:8002

# ============================================================================
# Subagents Configuration
# ============================================================================
# Configure timeouts for subagent execution
# Subagents are background workers delegated tasks by the lead agent

# subagents:
#   # Default timeout in seconds for all subagents (default: 900 = 15 minutes)
#   timeout_seconds: 900
#
#   # Optional per-agent timeout overrides
#   agents:
#     general-purpose:
#       timeout_seconds: 1800  # 30 minutes for complex multi-step tasks
#     bash:
#       timeout_seconds: 300   # 5 minutes for quick command execution

# ============================================================================
# Skills Configuration
# ============================================================================
# Configure skills directory for specialized agent workflows

skills:
  # Path to skills directory on the host (relative to project root or absolute)
  # Default: ../skills (relative to backend directory)
  # Uncomment to customize:
  # path: /absolute/path/to/custom/skills

  # Path where skills are mounted in the sandbox container
  # This is used by the agent to access skills in both local and Docker sandbox
  # Default: /mnt/skills
  container_path: /mnt/skills

# ============================================================================
# Title Generation Configuration
# ============================================================================
# Automatic conversation title generation settings

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null # Use default model (first model in models list)

# ============================================================================
# Summarization Configuration
# ============================================================================
# Automatically summarize conversation history when token limits are approached
# This helps maintain context in long conversations without exceeding model limits

summarization:
  enabled: true

  # Model to use for summarization (null = use default model)
  # Recommended: Use a lightweight, cost-effective model like "gpt-4o-mini" or similar
  model_name: null

  # Trigger conditions - at least one required
  # Summarization runs when ANY threshold is met (OR logic)
  # You can specify a single trigger or a list of triggers
  trigger:
    # Trigger when token count reaches 15564
    - type: tokens
      value: 15564
    # Uncomment to also trigger when message count reaches 50
    # - type: messages
    #   value: 50
    # Uncomment to trigger when 80% of model's max input tokens is reached
    # - type: fraction
    #   value: 0.8

  # Context retention policy after summarization
  # Specifies how much recent history to preserve
  keep:
    # Keep the most recent 10 messages (recommended)
    type: messages
    value: 10
    # Alternative: Keep specific token count
    # type: tokens
    # value: 3000
    # Alternative: Keep percentage of model's max input tokens
    # type: fraction
    # value: 0.3

  # Maximum tokens to keep when preparing messages for summarization
  # Set to null to skip trimming (not recommended for very long conversations)
  trim_tokens_to_summarize: 15564

  # Custom summary prompt template (null = use default LangChain prompt)
  # The prompt should guide the model to extract important context
  summary_prompt: null

# ============================================================================
# Scientific Vision (ImageReport) Configuration
# ============================================================================
# Optional pre-analysis step for scientific figures.
#
# When enabled:
# - `view_image` tool is available even for text-only main models.
# - After `view_image` completes, DeerFlow calls a (vision-capable) scientific vision model to generate a structured
#   `<image_report>` (JSON) and injects it into the main conversation for downstream reasoning and writing.
scientific_vision:
  enabled: false
  # Injection mode:
  # - index: inject references + summaries (recommended; token-efficient, audit-friendly)
  # - full:  inject full JSON payload (token-heavy)
  inject_mode: index
  # Model to use for scientific vision pre-analysis (null = use the current runtime model)
  # Recommended: a vision-capable model that is strong at scientific figures.
  model_name: null
  # Where to store audit artifacts (relative to /mnt/user-data/outputs)
  artifact_subdir: scientific-vision/image-reports
  # Reuse existing artifacts when available (cache hit = skip vision model call)
  cache_enabled: true
  # Maximum images per report generation (to control latency/cost)
  max_images: 4
  # Custom prompt template (null = use default ImageReport prompt)
  prompt_template: null
  # Write batch-level artifact (parsed output + provenance)
  write_batch_artifact: true
  # Include raw model output text in batch artifact (for audit/debugging)
  include_raw_model_output_in_batch: true
  # Write injection index artifact (references per-image reports)
  write_index_artifact: true
  # Optional: run type-specific evidence parsers (ROI-based quantification) and persist evidence tables/overlays
  evidence_enabled: false
  evidence_parsers: ["western_blot", "facs", "tsne", "spectrum"]
  evidence_write_csv: true
  evidence_write_overlay: true
  # If true, clears viewed_images after report generation to reduce context size
  clear_viewed_images_after_report: false

# ============================================================================
# Scientific Data Configuration
# ============================================================================
# Controls raw scientific data analysis tools independent of image-report flow.
# When enabled, tools like analyze_fcs/analyze_embedding_csv/analyze_spectrum_csv/
# analyze_densitometry_csv are available even if scientific_vision is disabled.
# Also enables:
# - audit_cross_modal_consistency (textual claim vs figure/raw-data consistency audit)
# - generate_reproducible_figure (code-level reproducible SVG/PDF figure generation)
scientific_data:
  enabled: false

# ============================================================================
# Journal Style Alignment Configuration
# ============================================================================
# Collect venue-specific recent high-impact papers as few-shot exemplars before
# manuscript generation/compilation.
journal_style:
  enabled: false
  # Number of few-shot samples to collect (recommended: 5)
  sample_size: 5
  # Search window in recent years (e.g., 5 years)
  recent_year_window: 5
  # Cache TTL to avoid repeated remote requests
  cache_ttl_hours: 24
  # OpenAlex request timeout
  request_timeout_seconds: 12
  # Max abstract excerpt chars included in prompt material
  max_excerpt_chars: 420

# ============================================================================
# Reviewer2 Adversarial Strategy Configuration
# ============================================================================
# Controls automatic Reviewer2 persona defaults and A/B preset strategy switch
# used by peer-review runtime (`simulate_peer_review_loop` / `compile_section`).
reviewer2_strategy:
  # Global fallback persona set when venue mapping misses
  default_styles:
    - statistical_tyrant
    - methodology_fundamentalist

  # Venue-specific defaults (key is case-insensitive)
  venue_style_overrides:
    nature:
      - methodology_fundamentalist
      - domain_traditionalist
    cell:
      - methodology_fundamentalist
      - domain_traditionalist
    neurips:
      - statistical_tyrant
      - methodology_fundamentalist
    icml:
      - statistical_tyrant
      - methodology_fundamentalist

  # A/B switch for combined round-count + persona-combo strategy experiments
  ab_enabled: true
  # off | A | B
  ab_default_variant: off

  # Auto traffic split by thread_id hash (for online/offline comparative evaluation)
  # When enabled and request doesn't force A/B/off, variant is assigned by:
  # hash(thread_id + ab_auto_split_salt) < ab_auto_split_ratio_a => A, else B.
  ab_auto_split_enabled: false
  ab_auto_split_ratio_a: 0.5
  ab_auto_split_salt: reviewer2-ab-v1

  # Arm A: conservative attack budget
  ab_variant_a_max_rounds: 2
  ab_variant_a_styles:
    - statistical_tyrant
    - methodology_fundamentalist

  # Arm B: aggressive attack budget
  ab_variant_b_max_rounds: 4
  ab_variant_b_styles:
    - statistical_tyrant
    - methodology_fundamentalist
    - domain_traditionalist

  # Persist and aggregate A/B outcome metrics
  ab_metrics_enabled: true
  ab_metrics_max_recent_runs: 120

# ============================================================================
# Failure Mode Gate Configuration
# ============================================================================
# Thresholds for academic red-team failure-mode gating.
# Useful for CI tightening by branch/stage (e.g., release branch uses stricter values).
failure_mode_gate:
  citation_fidelity_max: 0.75
  overclaim_claim_grounding_max: 0.65
  numeric_drift_abstract_body_max: 0.8
  evidence_chain_claim_grounding_max: 0.55
  style_mismatch_venue_fit_max: 0.7
  superficial_rebuttal_completeness_max: 0.7
  min_target_recall: 0.95
  max_control_false_positive_rate: 0.2

# ============================================================================
# Native LaTeX Manuscript Pipeline
# ============================================================================
# Build `.tex` directly from manuscript markdown and optionally compile PDF via
# local TeX engine (latexmk / pdflatex / xelatex).
latex:
  enabled: true
  # auto | none | latexmk | pdflatex | xelatex
  default_engine: auto
  compile_pdf_by_default: true
  compile_timeout_seconds: 120
  artifact_subdir: research-writing/latex

# ============================================================================
# Memory Configuration
# ============================================================================
# Global memory mechanism
# Stores user context and conversation history for personalized responses
memory:
  enabled: true
  storage_path: memory.json # Path relative to backend directory
  debounce_seconds: 30 # Wait time before processing queued updates
  model_name: null # Use default model
  max_facts: 100 # Maximum number of facts to store
  fact_confidence_threshold: 0.7 # Minimum confidence for storing facts
  injection_enabled: true # Whether to inject memory into system prompt
  max_injection_tokens: 2000 # Maximum tokens for memory injection
  # Long-horizon summary memory (vector retrieval for research writing continuity)
  long_horizon_enabled: true
  long_horizon_storage_path: .deer-flow/memory_long_horizon.json
  long_horizon_max_entries: 500
  long_horizon_summary_chars: 900
  long_horizon_injection_enabled: true
  long_horizon_top_k: 5
  long_horizon_min_similarity: 0.12
  long_horizon_injection_max_chars: 2400
  # Dense embedding + cross-thread project/topic memory
  long_horizon_embedding_dim: 256
  long_horizon_cross_thread_enabled: true
  long_horizon_topic_memory_enabled: true
  long_horizon_topic_top_k: 2
  long_horizon_project_memory_enabled: true
  long_horizon_project_top_k: 2
  long_horizon_current_thread_boost: 0.08
  long_horizon_project_boost: 0.12
  long_horizon_topic_overlap_boost: 0.03
  # Hypothesis-validation trajectory memory (failed attempts -> future intuition)
  long_horizon_hypothesis_memory_enabled: true
  long_horizon_hypothesis_top_k: 2
  long_horizon_hypothesis_max_entries: 400
  long_horizon_hypothesis_failure_boost: 0.08


# ============================================================================
# Checkpointer Configuration
# ============================================================================
# Configure state persistence for the embedded DeerFlowClient.
# The LangGraph Server manages its own state persistence separately
# via the server infrastructure (this setting does not affect it).
#
# When configured, DeerFlowClient will automatically use this checkpointer,
# enabling multi-turn conversations to persist across process restarts.
#
# Supported types:
#   memory   - In-process only. State is lost when the process exits. (default)
#   sqlite   - File-based SQLite persistence. Survives restarts.
#              Requires: uv add langgraph-checkpoint-sqlite
#   postgres - PostgreSQL persistence. Suitable for multi-process deployments.
#              Requires: uv add langgraph-checkpoint-postgres psycopg[binary] psycopg-pool
#
# Examples:
#
# In-memory (default when omitted — no persistence):
# checkpointer:
#   type: memory
#
# SQLite (file-based, single-process):
# checkpointer:
#   type: sqlite
#   connection_string: checkpoints.db
#
# PostgreSQL (multi-process, production):
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/deerflow

# ============================================================================
# IM Channels Configuration
# ============================================================================
# Connect DeerFlow to external messaging platforms.
# All channels use outbound connections (WebSocket or polling) — no public IP required.

# channels:
#   # LangGraph Server URL for thread/message management (default: http://localhost:2024)
#   langgraph_url: http://localhost:2024
#   # Gateway API URL for auxiliary queries like /models, /memory (default: http://localhost:8001)
#   gateway_url: http://localhost:8001
#
#   # Optional: default mobile/session settings for all IM channels
#   session:
#     assistant_id: lead_agent
#     config:
#       recursion_limit: 100
#     context:
#       thinking_enabled: true
#       is_plan_mode: false
#       subagent_enabled: false
#
#   feishu:
#     enabled: false
#     app_id: $FEISHU_APP_ID
#     app_secret: $FEISHU_APP_SECRET
#
#   slack:
#     enabled: false
#     bot_token: $SLACK_BOT_TOKEN     # xoxb-...
#     app_token: $SLACK_APP_TOKEN     # xapp-... (Socket Mode)
#     allowed_users: []               # empty = allow all
#
#   telegram:
#     enabled: false
#     bot_token: $TELEGRAM_BOT_TOKEN
#     allowed_users: []               # empty = allow all
#
#     # Optional: channel-level session overrides
#     session:
#       assistant_id: mobile_agent
#       context:
#         thinking_enabled: false
#
#       # Optional: per-user overrides by user_id
#       users:
#         "123456789":
#           assistant_id: vip_agent
#           config:
#             recursion_limit: 150
#           context:
#             thinking_enabled: true
#             subagent_enabled: true
