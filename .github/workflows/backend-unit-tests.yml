name: Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Lint backend
        working-directory: backend
        run: make lint

      - name: Run unit tests of backend with coverage
        working-directory: backend
        run: |
          uv run pytest tests/ -v --tb=short --co -q 2>/dev/null | tail -1 || true
          uv run pytest tests/ -v --tb=short

      - name: Check test coverage
        working-directory: backend
        run: |
          uv run pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=30 || echo "::warning::Coverage below 30% threshold"
