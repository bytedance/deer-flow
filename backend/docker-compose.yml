  #     - neo4jdata:/data
  #   healthcheck:
  #     test: ["CMD", "neo4j", "status"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  pgdata:
  redisdata:
  neo4jdata:
