rules:
  - id: secret-private-key
    languages:
      - generic
    severity: ERROR
    message: Private key material is embedded in skill content.
    metadata:
      deerflow_severity: CRITICAL
      remediation: Move the key to an environment variable or external secret store.
    pattern-regex: '-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----'

  - id: secret-cloud-token
    languages:
      - generic
    severity: ERROR
    message: Cloud or service token with a reserved prefix is embedded in skill content.
    metadata:
      deerflow_severity: CRITICAL
      remediation: Remove the token and read it from environment variables or a secret manager.
    pattern-either:
      - pattern-regex: '\bAKIA[0-9A-Z]{16}\b'
      - pattern-regex: '\bghp_[A-Za-z0-9_]{36,}\b'
      - pattern-regex: '\bxox[baprs]-[A-Za-z0-9-]{10,}\b'
